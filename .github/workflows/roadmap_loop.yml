name: roadmap-loop

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 0-3,7-8,13-23 * * *"

permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run cycle
        env:
          TELEGRAM_ENABLED: ${{ secrets.TELEGRAM_ENABLED }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PROGRESS_THREAD_ID: ${{ secrets.TELEGRAM_PROGRESS_THREAD_ID }}
          TELEGRAM_PARSE_MODE: ${{ secrets.TELEGRAM_PARSE_MODE }}
          AI_TASK_RUNNER_PROVIDER: ${{ secrets.AI_TASK_RUNNER_PROVIDER }}
          AI_TASK_RUNNER_API_KEY: ${{ secrets.AI_TASK_RUNNER_API_KEY }}
          AI_TASK_RUNNER_BASE_URL: ${{ secrets.AI_TASK_RUNNER_BASE_URL }}
          AI_TASK_RUNNER_MODEL: ${{ secrets.AI_TASK_RUNNER_MODEL }}
          DEEPSEEK_OFFPEAK_ONLY: ${{ secrets.DEEPSEEK_OFFPEAK_ONLY }}
          DEEPSEEK_TIMEZONE: Europe/Istanbul
        run: |
          python scripts/run_cycle.py --send-telegram --commit-push
